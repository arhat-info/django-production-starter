version: '3.9'

services:

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB:       app_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BUILD_ENV: local
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    env_file: .env
    command: >
      sh -c "python scripts/wait_for_db.py &&
             python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BUILD_ENV: local
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    env_file: .env
    command: >
      sh -c "python scripts/wait_for_db.py &&
             celery -A config worker --loglevel=info --concurrency=2"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BUILD_ENV: local
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    env_file: .env
    command: >
      sh -c "python scripts/wait_for_db.py &&
             celery -A config beat --loglevel=info"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BUILD_ENV: local
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    env_file: .env
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data: